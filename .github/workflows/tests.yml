name: BarberBot Tests

# Запускать при каждом пуше
on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest # Поднимаем чистый виртуальный сервер на Убунту

    steps:
      # 1. Скачиваем твой код на сервер
      - name: Check out repository
        uses: actions/checkout@v4

      # 2. Так как у тебя в проекте есть переменные окружения,
      # создадим фейковый .env прямо на лету, чтобы докер не ругался при сборке
      - name: Create fake .env for testing
        run: |
          touch .env
          echo 'TOKEN=test_token' >> .env
          echo 'ADMIN_ID=123456' >> .env
          echo 'DB_HOST=db' >> .env
          echo 'DB_PORT=5432' >> .env
          echo 'DB_NAME=test_db' >> .env
          echo 'DB_USER=test_user' >> .env
          echo 'DB_PASS=test_pass' >> .env
          echo 'POSTGRES_DB=test_db' >> .env
          echo 'POSTGRES_USER=test_user' >> .env
          echo 'POSTGRES_PASSWORD=test_pass' >> .env
          echo 'SECRET_KEY=test_secret_key' >> .env
          echo 'DEBUG=True' >> .env

      # 3. Поднимаем твои контейнеры и запускаем тесты
      - name: Run Tests in Docker
        run: |
          # Запускаем докер в фоновом режиме
          docker compose up -d
          
          # Даем базе данных 15 секунд на то, чтобы проснуться
          sleep 15
          
          # Тесты 
          docker compose exec -T web python web/manage.py test shop