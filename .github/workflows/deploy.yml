name: Deploy to Production

# Запускать деплой только после пуша в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Execute SSH commands on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/BarberBot
            git pull
            docker-compose up -d --build web bot celery
            docker-compose exec -T web python web/manage.py migrate
            docker-compose exec -T web python web/manage.py collectstatic --no-input
